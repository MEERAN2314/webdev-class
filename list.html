<!DOCTYPE html>
<html>
    <head>
        <title>Learning Lists</title>
    </head>
    <body>
        <!-- Unordered List -->
        <h4>Shopping List - Unordered List</h4>
        <ul>
            <li>Milk</li>
            <li>Bread</li>
            <li>Eggs</li>
            <ul>
                <li>Fruits</li>
                <li>Vegetables</li>
            </ul>
        </ul>

        <!-- Ordered List -->
         <h4>To do list</h4>
        <ol>
            <li>Wake up</li>
            <li>Brush teeth</li>
            <li>Have breakfast</li>
            <ol>
                <li>Make coffee</li>
                <li>Eat cereal</li>
            </ol>
        </ol>

        <!-- Description List -->
         <dl>
            <dt>dragon</dt>
            <dd>A large, mythical creature with a long tail and a fierce disposition.</dd>
         </dl>
    </body>
</html>
