<!DOCTYPE html>
<html>
    <head>
        <title>Group</title>
    </head>
    <body>
        <!-- Group together html elements -->
         <!-- <span> inline container to group elements for styling-->
         <!-- <div> block container to group elements for styling-->

        <h1><span style="background-color: red; color: white;"> This is a span Title</span></h1>
        <h2><span style="background-color: blue; color: white;"> This is a span Subtitle</span></h2>

        <div style="background-color: lightgray; ">
            <h3>This is a div Title</h3>
            <p>This is a paragraph inside a div.</p>
            <p>This is another paragraph inside the same div.</p>
        </div>
    </body> 
</html>
